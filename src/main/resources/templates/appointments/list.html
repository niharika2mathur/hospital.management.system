<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Appointments</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-warning">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="/">🏥 Hospital MS</a>
        <div class="navbar-nav ms-auto flex-row align-items-center gap-3">
            <a class="nav-link text-white" href="/patients">Patients</a>
            <a class="nav-link text-white" href="/doctors">Doctors</a>
            <a class="nav-link text-white" href="/appointments">Appointments</a>
            <a class="nav-link text-white" href="/billing">Billing</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Appointments</h3>
        <a href="/appointments/add" class="btn btn-warning">+ Book Appointment</a>
    </div>

    <table class="table table-bordered table-hover bg-white">
        <thead class="table-warning">
            <tr>
                <th>ID</th><th>Patient</th><th>Doctor</th>
                <th>Date</th><th>Time</th><th>Status</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="appointment : ${appointments}">
                <td th:text="${appointment.id}"></td>
                <td th:text="${appointment.patient.name}"></td>
                <td th:text="'Dr. ' + ${appointment.doctor.name}"></td>
                <td th:text="${appointment.appointmentDate}"></td>
                <td th:text="${appointment.appointmentTime}"></td>
                <td>
                    <span th:text="${appointment.status}"
                          th:class="${appointment.status == 'SCHEDULED'} ? 'badge bg-primary' :
                                    (${appointment.status == 'COMPLETED'} ? 'badge bg-success' : 'badge bg-danger')">
                    </span>
                </td>
                <td>
                    <a th:href="@{/appointments/edit/{id}(id=${appointment.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/appointments/cancel/{id}(id=${appointment.id})}" class="btn btn-sm btn-secondary"
                       onclick="return confirm('Cancel this appointment?')">Cancel</a>
                    <a th:href="@{/appointments/delete/{id}(id=${appointment.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
