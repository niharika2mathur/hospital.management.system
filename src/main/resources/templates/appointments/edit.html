<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Appointment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-warning">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="/">🏥 Hospital MS</a>
    </div>
</nav>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">Edit Appointment</h4>
                    <form th:action="@{/appointments/edit/{id}(id=${appointment.id})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Patient</label>
                            <select class="form-select" name="patientId" required>
                                <option th:each="patient : ${patients}"
                                        th:value="${patient.id}"
                                        th:selected="${patient.id == appointment.patient.id}"
                                        th:text="${patient.name}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Doctor</label>
                            <select class="form-select" name="doctorId" required>
                                <option th:each="doctor : ${doctors}"
                                        th:value="${doctor.id}"
                                        th:selected="${doctor.id == appointment.doctor.id}"
                                        th:text="'Dr. ' + ${doctor.name} + ' (' + ${doctor.specialization} + ')'">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" name="appointmentDate"
                                   th:value="${appointment.appointmentDate}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Time</label>
                            <input type="time" class="form-control" name="appointmentTime"
                                   th:value="${appointment.appointmentTime}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="status">
                                <option value="SCHEDULED" th:selected="${appointment.status == 'SCHEDULED'}">Scheduled</option>
                                <option value="COMPLETED" th:selected="${appointment.status == 'COMPLETED'}">Completed</option>
                                <option value="CANCELLED" th:selected="${appointment.status == 'CANCELLED'}">Cancelled</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" name="notes" rows="3"
                                      th:text="${appointment.notes}"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">Update Appointment</button>
                            <a href="/appointments" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
