<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — Hospital MS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            overflow: hidden;
        }
        .login-header {
            background: #0d6efd;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .login-body {
            background: white;
            padding: 2rem;
        }
        .hospital-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
<div class="login-card shadow-lg">
    <div class="login-header">
        <div class="hospital-icon">🏥</div>
        <h3 class="fw-bold mb-1">Hospital Management System</h3>
        <p class="mb-0 opacity-75">Please sign in to continue</p>
    </div>
    <div class="login-body">

        <!-- Error message -->
        <div th:if="${errorMsg}" class="alert alert-danger py-2" th:text="${errorMsg}"></div>

        <!-- Logout message -->
        <div th:if="${logoutMsg}" class="alert alert-success py-2" th:text="${logoutMsg}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-500">Username</label>
                <input type="text" name="username" class="form-control form-control-lg"
                       placeholder="Enter username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-500">Password</label>
                <input type="password" name="password" class="form-control form-control-lg"
                       placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Sign In</button>
        </form>

        <div class="mt-3 text-center text-muted" style="font-size: 13px;">
            <p class="mb-1">Demo credentials:</p>
            <code>admin / admin</code> &nbsp;|&nbsp; <code>doctor / doctor123</code>
        </div>
    </div>
</div>
</body>
</html>
