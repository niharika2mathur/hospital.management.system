<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctors</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏥 Hospital MS</a>
        <div class="navbar-nav ms-auto flex-row align-items-center gap-3">
            <a class="nav-link text-white" href="/patients">Patients</a>
            <a class="nav-link text-white" href="/doctors">Doctors</a>
            <a class="nav-link text-white" href="/appointments">Appointments</a>
            <a class="nav-link text-white" href="/billing">Billing</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Doctors</h3>
        <a href="/doctors/add" class="btn btn-success">+ Add Doctor</a>
    </div>

    <form action="/doctors/search" method="get" class="d-flex gap-2 mb-3">
        <input type="text" name="specialization" class="form-control" placeholder="Search by specialization...">
        <button type="submit" class="btn btn-outline-success">Search</button>
    </form>

    <table class="table table-bordered table-hover bg-white">
        <thead class="table-success">
            <tr>
                <th>ID</th><th>Name</th><th>Specialization</th>
                <th>Qualification</th><th>Experience</th><th>Available</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="doctor : ${doctors}">
                <td th:text="${doctor.id}"></td>
                <td th:text="'Dr. ' + ${doctor.name}"></td>
                <td th:text="${doctor.specialization}"></td>
                <td th:text="${doctor.qualification}"></td>
                <td th:text="${doctor.experience} + ' yrs'"></td>
                <td>
                    <span th:if="${doctor.available}" class="badge bg-success">Yes</span>
                    <span th:unless="${doctor.available}" class="badge bg-danger">No</span>
                </td>
                <td>
                    <a th:href="@{/doctors/edit/{id}(id=${doctor.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/doctors/delete/{id}(id=${doctor.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this doctor?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
