<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Bill</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏥 Hospital MS</a>
        <div class="navbar-nav ms-auto flex-row align-items-center gap-3">
            <a class="nav-link text-white" href="/patients">Patients</a>
            <a class="nav-link text-white" href="/doctors">Doctors</a>
            <a class="nav-link text-white" href="/appointments">Appointments</a>
            <a class="nav-link text-white" href="/billing">Billing</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">Create New Bill</h4>
                    <form action="/billing/add" method="post">

                        <!-- Patient field -->
                        <div class="mb-3">
                            <label class="form-label">Patient</label>
                            <div th:if="${selectedPatient != null}">
                                <input type="text" class="form-control bg-light"
                                       th:value="${selectedPatient.name}" readonly>
                                <input type="hidden" name="patientId"
                                       th:value="${selectedPatient.id}">
                            </div>
                            <div th:if="${selectedPatient == null}">
                                <select class="form-select" name="patientId" required>
                                    <option value="">Select Patient</option>
                                    <option th:each="patient : ${patients}"
                                            th:value="${patient.id}"
                                            th:text="${patient.name}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Appointment field -->
                        <div class="mb-3">
                            <label class="form-label">Appointment (optional)</label>
                            <select class="form-select" name="appointmentId">
                                <option value="">None</option>
                                <option th:each="apt : ${appointments}"
                                        th:value="${apt.id}"
                                        th:text="'Dr.' + ${apt.doctor.name} + ' — ' + ${apt.appointmentDate}">
                                </option>
                            </select>
                        </div>

                        <!-- Amount -->
                        <div class="mb-3">
                            <label class="form-label">Amount (₹)</label>
                            <input type="number" step="0.01" class="form-control"
                                   name="amount" required min="0">
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3"
                                      placeholder="e.g. Consultation fee, Lab tests..."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Create Bill</button>
                            <a href="/billing" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
