<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patients</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏥 Hospital MS</a>
        <div class="navbar-nav ms-auto flex-row align-items-center gap-3">
            <a class="nav-link text-white" href="/patients">Patients</a>
            <a class="nav-link text-white" href="/doctors">Doctors</a>
            <a class="nav-link text-white" href="/appointments">Appointments</a>
            <a class="nav-link text-white" href="/billing">Billing</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Patients</h3>
        <a href="/patients/add" class="btn btn-primary">+ Add Patient</a>
    </div>

    <form action="/patients/search" method="get" class="d-flex gap-2 mb-3">
        <input type="text" name="name" class="form-control"
               placeholder="Search by name...">
        <button type="submit" class="btn btn-outline-primary">Search</button>
    </form>

    <table class="table table-bordered table-hover bg-white">
        <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Blood Group</th>
                <th>Phone</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="patient : ${patients}">
                <td th:text="${patient.id}"></td>
                <td th:text="${patient.name}"></td>
                <td th:text="${patient.age}"></td>
                <td th:text="${patient.gender}"></td>
                <td th:text="${patient.bloodGroup}"></td>
                <td th:text="${patient.phone}"></td>
                <td>
                    <a th:href="@{/patients/history/{id}(id=${patient.id})}"
                       class="btn btn-sm btn-info">History</a>
                    <a th:href="@{/patients/edit/{id}(id=${patient.id})}"
                       class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/patients/delete/{id}(id=${patient.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this patient and all their records?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
